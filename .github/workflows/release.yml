# Publish to PyPI via Trusted Publishing (OIDC) — no API token anywhere.
#
# Trigger: push a version tag (v0.1.0, v0.2.0, ...).
# Flow: test -> build wheel+sdist -> publish to PyPI.
#
# PyPI side (one-time): register this repo+workflow as a Trusted Publisher for
# the project `fusion-hcm-mcp-server`:
#   owner: mohantyajitesh · repo: fusion-hcm-mcp-server
#   workflow: release.yml · environment: pypi

name: Release to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with dev extras
        run: pip install -e ".[dev]"
      - name: Run test suite
        run: pytest -q
      - name: Guard — tag must match pyproject version
        run: |
          PKG_VERSION=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject version $PKG_VERSION" >&2
            exit 1
          fi

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build
      - name: Check metadata renders
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fusion-hcm-mcp-server
    permissions:
      id-token: write   # REQUIRED for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
